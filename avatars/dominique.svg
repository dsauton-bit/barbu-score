<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Fond -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Corps -->
  <ellipse cx="100" cy="185" rx="52" ry="38" fill="#5b21b6"/>
  <!-- Haut vêtement -->
  <ellipse cx="100" cy="160" rx="40" ry="28" fill="#6d28d9"/>

  <!-- Cou -->
  <rect x="88" y="118" width="24" height="20" rx="6" fill="url(#skin)"/>

  <!-- Tête -->
  <ellipse cx="100" cy="104" rx="34" ry="36" fill="url(#skin)"/>

  <!-- Cheveux longs (femme) -->
  <ellipse cx="100" cy="82" rx="36" ry="22" fill="#1c1917"/>
  <rect x="64" y="82" width="13" height="38" rx="6" fill="#1c1917"/>
  <rect x="123" y="82" width="13" height="38" rx="6" fill="#1c1917"/>
  <!-- Mèche centrale -->
  <ellipse cx="100" cy="75" rx="20" ry="10" fill="#292524"/>

  <!-- Yeux -->
  <ellipse cx="88" cy="106" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="112" cy="106" rx="5" ry="5.5" fill="white"/>
  <circle cx="89" cy="107" r="3" fill="#1c1917"/>
  <circle cx="113" cy="107" r="3" fill="#1c1917"/>
  <circle cx="90" cy="106" r="1" fill="white"/>
  <circle cx="114" cy="106" r="1" fill="white"/>

  <!-- Sourcils -->
  <path d="M82 99 Q88 96 94 99" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M106 99 Q112 96 118 99" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nez -->
  <ellipse cx="100" cy="115" rx="3" ry="2" fill="#e09b5a" opacity="0.6"/>

  <!-- Sourire -->
  <path d="M90 123 Q100 130 110 123" stroke="#c2410c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Initiale -->
  <text x="100" y="194" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="white" opacity="0.9">Dominique</text>

  <circle cx="100" cy="100" r="99" fill="none" stroke="rgba(167,139,250,0.5)" stroke-width="2"/>
</svg>

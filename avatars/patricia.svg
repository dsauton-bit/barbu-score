<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#db2777"/>
      <stop offset="100%" style="stop-color:#9d174d"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Corps -->
  <ellipse cx="100" cy="185" rx="52" ry="38" fill="#831843"/>
  <ellipse cx="100" cy="160" rx="40" ry="28" fill="#9d174d"/>

  <!-- Cou -->
  <rect x="88" y="118" width="24" height="20" rx="6" fill="url(#skin)"/>

  <!-- Tête -->
  <ellipse cx="100" cy="104" rx="34" ry="36" fill="url(#skin)"/>

  <!-- Cheveux courts bouclés -->
  <ellipse cx="100" cy="78" rx="38" ry="24" fill="#7c2d12"/>
  <circle cx="68" cy="90" r="12" fill="#7c2d12"/>
  <circle cx="132" cy="90" r="12" fill="#7c2d12"/>
  <circle cx="78" cy="78" r="10" fill="#92400e"/>
  <circle cx="122" cy="78" r="10" fill="#92400e"/>
  <circle cx="100" cy="70" r="11" fill="#92400e"/>

  <!-- Yeux -->
  <ellipse cx="88" cy="106" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="112" cy="106" rx="5" ry="5.5" fill="white"/>
  <circle cx="89" cy="107" r="3" fill="#1c1917"/>
  <circle cx="113" cy="107" r="3" fill="#1c1917"/>
  <circle cx="90" cy="106" r="1" fill="white"/>
  <circle cx="114" cy="106" r="1" fill="white"/>

  <!-- Sourcils arqués -->
  <path d="M82 98 Q88 94 94 98" stroke="#7c2d12" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M106 98 Q112 94 118 98" stroke="#7c2d12" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nez -->
  <ellipse cx="100" cy="115" rx="3" ry="2" fill="#e09b5a" opacity="0.6"/>

  <!-- Sourire -->
  <path d="M89 122 Q100 131 111 122" stroke="#be185d" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Boucles d'oreilles -->
  <circle cx="66" cy="108" r="4" fill="#fbbf24"/>
  <circle cx="134" cy="108" r="4" fill="#fbbf24"/>

  <text x="100" y="194" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="white" opacity="0.9">Patricia</text>

  <circle cx="100" cy="100" r="99" fill="none" stroke="rgba(244,114,182,0.5)" stroke-width="2"/>
</svg>
